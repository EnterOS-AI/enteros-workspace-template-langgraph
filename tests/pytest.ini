[pytest]
# Anchor pytest's rootdir at tests/ so the template's __init__.py
# (which does `from .adapter import LangGraphAdapter` for runtime
# discovery) is not picked up as a package node. The relative import
# would fail because adapter.py's runtime deps (molecule_runtime, a2a)
# aren't installed in the test environment — they're stubbed in
# conftest.py for the tests/ tree only.
addopts = --import-mode=importlib
asyncio_mode = auto
